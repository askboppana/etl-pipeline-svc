plugins {
    id 'java'
    id 'jacoco'
}
group = 'com.forgeops'
version = '1.0.0'
java { sourceCompatibility = '17' }
repositories { mavenCentral() }
dependencies {
    implementation 'com.google.code.gson:gson:2.10.1'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
}
tasks.named('test') { useJUnitPlatform() }
